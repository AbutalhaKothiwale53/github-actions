name: 01 Basic Deployment  # Workflow name (top level)
on: 
  push:  # Trigger on push
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Test Code
        run: npm test
      
      - name: Build Code
        run: npm run build
      
      - name: Deploy Code
        run: echo "Deploying code"
